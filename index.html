<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Drum Kit • Reyomusic</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="dark-theme">
  <div class="app-container">
    <header class="header">
  <h1>
    <span class="gradient-text">Drum</span>
    <span class="emoji">🥁</span>
    <span class="kit">Kit</span>
  </h1>
  <p class="subtitle">by Richard Eyo
</header>
    <main class="main-content">
      <!-- Controls Panel -->
      <section class="control-panel glass">
        <div class="control-group">
          <label>Kit</label>
          <select id="kit-select">
            <option value="rock">Rock Kit</option>
            <option value="electronic">Electronic Kit</option>
            <option value="percussion">Percussion Kit</option>
          </select>
        </div>

        <div class="control-group">
          <label>Volume</label>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1"/>
        </div>

        <div class="control-group">
          <label>BPM</label>
          <input type="number" id="metronome-bpm" min="40" max="240" value="120"/>
        </div>

        <div class="control-buttons">
          <button id="theme-toggle" class="btn btn-secondary">Toggle Theme</button>
          <button id="metronome-toggle" class="btn btn-primary">Start Metronome</button>
          <button id="record-start" class="btn btn-record">Start Recording  🛑</button>
          <button id="record-stop" class="btn btn-record" disabled>Stop Recording</button>
          <button id="playback" class="btn btn-play">Play Recording</button>
          <button id="reset" class="btn btn-danger">Reset</button>
        </div>
      </section>

      <!-- Drum Pads -->
      <section class="drum-pads">
        <div class="drum-grid">
          <button class="drum w" data-key="w">W</button>
          <button class="drum a" data-key="a">A</button>
          <button class="drum s" data-key="s">S</button>
          <button class="drum d" data-key="d">D</button>
          <button class="drum j" data-key="j">J</button>
          <button class="drum k" data-key="k">K</button>
          <button class="drum l" data-key="l">L</button>
          <button class="drum q" data-key="q">Q</button>
          <button class="drum e" data-key="e">E</button>
          <button class="drum r" data-key="r">R</button>
          <button class="drum f" data-key="f">F</button>
          <button class="drum g" data-key="g">G</button>
        </div>
      </section>

    <footer>
      <p>Made with ❤️ in Lagos, Nigeria | 2026</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
